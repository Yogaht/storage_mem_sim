# Atlas A3 host DDR approximation.
# 32 DDR5 slots, up to 64 GB per slot:
#   capacity: 32 slots * 64 GB/slot = 2048 GB = 2 TB
#   bandwidth: 64 x 32-bit DDR5 subchannels * 5200e6 = 1331.2 GB/s peak.
#
# DDR5 exposes two independent 32-bit subchannels per DIMM channel. This model
# represents 32 slots as 64 controllers, each controller modeling one 32-bit
# subchannel. DDR5_32Gb_x4 provides 32 GB per subchannel:
#   32 Gb device density * 8 x4 devices/subchannel = 256 Gb = 32 GB.
MemorySystem:
  impl: GenericDRAM
  clock_ratio: 1
  ChannelMapper:
    impl: CacheLineInterleave
  DRAM:
    impl: DDR5
    org:
      preset: DDR5_32Gb_x4
    timing:
      preset: DDR5_5600AN
      rate: 5200
      tCK_ps: 385
  Controllers:
    - impl: GenericDDR
      count: 64
      Scheduler:
        impl: FRFCFS
      RowPolicy:
        impl: Open
      AddrMapper:
        impl: RoBaRaCoCh
      RefreshManager:
        impl: NoRefresh
