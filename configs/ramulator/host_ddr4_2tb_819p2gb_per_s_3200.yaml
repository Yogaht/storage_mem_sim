# Atlas 800T A2 host DDR approximation.
# 4 Kunpeng 920 CPUs, 32 DDR4 slots, up to 64 GB per slot:
#   capacity: 32 slots * 64 GB/slot = 2048 GB = 2 TB
#   bandwidth: 32 channels * 64 bit / 8 * 3200e6 = 819.2 GB/s peak.
#
# The DDR4_16Gb_x4 preset with rank=2 models one 64 GB DDR4 channel:
#   16 Gb device density * 16 x4 devices/channel * 2 ranks = 512 Gb = 64 GB.
MemorySystem:
  impl: GenericDRAM
  clock_ratio: 1
  ChannelMapper:
    impl: CacheLineInterleave
  DRAM:
    impl: DDR4
    org:
      preset: DDR4_16Gb_x4
      rank: 2
    timing:
      preset: DDR4_3200AA
  Controllers:
    - impl: GenericDDR
      count: 32
      Scheduler:
        impl: FRFCFS
      RowPolicy:
        impl: Open
      AddrMapper:
        impl: RoBaRaCoCh
      RefreshManager:
        impl: NoRefresh
