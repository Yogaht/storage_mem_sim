# Ascend A3-class HBM approximation.
# Reuses the A2-class 64 GB / 1.6 TB/s HBM2e-3200 approximate model.
# See ascend_a2_hbm.yaml for full documentation of the timing model.
#
#   capacity:  64 channels * 1 GB/pseudo-channel = 64 GB
#   bandwidth: 64 channels * 64 bit / 8 * 3200e6 = 1638.4 GB/s peak
MemorySystem:
  impl: GenericDRAM
  clock_ratio: 1
  ChannelMapper:
    impl: CacheLineInterleave
  DRAM:
    impl: HBM2
    org:
      preset: HBM2_8Gb
      pseudochannel: 1
    timing:
      preset: HBM2_2400Mbps
      rate: 3200
      tCK_ps: 625
      nCL: 23
      nRCDRD: 23
      nRCDWR: 19
      nRP: 23
      nRAS: 54
      nRC: 77  # nRAS + nRP = 54 + 23
      nWR: 26
      nRTPL: 8
      nCWL: 8
      nCCDL: 4
      nWTRS: 11
      nWTRL: 14
      nRRDS: 7
      nRRDL: 7
      nFAW: 24
      nRFC: 560
      nRFCpb: 256
      nRREFD: 13
      nREFI: 6240
      nREFIpb: 390
  Controllers:
    - impl: HBM12
      count: 64
      Scheduler:
        impl: FRFCFS
      RowPolicy:
        impl: Open
      AddrMapper:
        impl: RoBaRaCoCh
      RefreshManager:
        impl: NoRefresh
